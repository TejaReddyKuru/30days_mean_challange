<!DOCTYPE html>
<html>
<head>
    <title>Without Throttle</title>
</head>
<body>

    <div style="height:3000px;background:lightblue;">
        Scroll Down
    </div>

    <script>
        function handleScroll() {
            console.log("Scrolling...");
        }

        window.addEventListener("scroll", handleScroll);
    </script>

</body>
</html>
