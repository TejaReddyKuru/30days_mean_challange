<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Event Capturing</title>

<style>
#parent{
    width:300px;
    height:300px;
    background:skyblue;
    padding:20px;
}

#child{
    width:150px;
    height:150px;
    background:orange;
    display:flex;
    justify-content:center;
    align-items:center;
}
</style>

</head>
<body>

<div id="parent">
    <h3>Parent</h3>

    <div id="child">
        <h3>Child</h3>
    </div>
</div>

<script>

let parent=document.getElementById("parent");
let child=document.getElementById("child");

parent.addEventListener("click",()=>{
    console.log("Parent Clicked");
},true);

child.addEventListener("click",()=>{
    console.log("Child Clicked");
},true);

</script>

</body>
</html>
